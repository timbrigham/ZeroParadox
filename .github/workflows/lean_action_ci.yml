name: Lean Action CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
