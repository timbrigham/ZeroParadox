name: Lean Action CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - uses: leanprover-community/docgen-action@v1
